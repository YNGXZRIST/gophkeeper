# Конфиг для github.com/vladopajic/go-test-coverage (workflow coverage.yml).
# Локально: go test ./... -coverprofile=cover.out, затем go-test-coverage --config .testcoverage.yml
profile: cover.out

# Сгенерированный и не покрываемый юнит-тестами код не учитываем в проценте.
exclude:
  paths:
    - ^gophkeeper/internal/shared/proto
    - ^gophkeeper/cmd/
    - ^gophkeeper/migrations
    - ^gophkeeper/internal/server/db/conn/mock
    - ^gophkeeper/internal/server/model
    - ^gophkeeper/internal/client/model

threshold:
  file: 0
  package: 0
  # ТЗ требует не менее 70%; локально total ~90%.
  total: 70
