edition = "2023";

package card.v1;

option go_package = "gophkeeper/internal/shared/proto/card/v1;cardv1";

import "google/protobuf/timestamp.proto";

// Card is a user's client-side encrypted card record.
message Card {
  string id = 1;
  bytes data = 2;
  int64 version = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message AddRequest {
  bytes data = 1;
  string id = 2;
}
message AddResponse {
  Card card = 1;
}

message GetRequest {
  string id = 1;
}
message GetResponse {
  Card card = 1;
}

// ListRequest pages a user's cards in chunks.
message ListRequest {
  string last_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}
message ListResponse {
  repeated Card cards = 1;
}

message UpdateRequest {
  string id = 1;
  bytes data = 2;
  int64 version = 3;
}
message UpdateResponse {
  Card card = 1;
}

message DeleteRequest {
  string id = 1;
}
message DeleteResponse {}

message ChangesRequest {
  string since = 1;
}
message CardChange {
  string id = 1;
  bytes data = 2;
  int64 version = 3;
  bool deleted = 4;
  google.protobuf.Timestamp updated_at = 5;
}
message ChangesResponse {
  repeated CardChange changes = 1;
}

service CardService {
  rpc Add(AddRequest) returns (AddResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Changes(ChangesRequest) returns (ChangesResponse);
}