edition = "2023";

package note.v1;

option go_package = "gophkeeper/internal/shared/proto/note/v1;notev1";

import "google/protobuf/timestamp.proto";

// Note is a user's client-side encrypted note record.
message Note {
  string id = 1;
  bytes data = 2;
  int64 version = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}
message AddRequest {
  bytes data = 1;
}
message AddResponse {
  Note note = 1;
}
message GetRequest {
  string id = 1;
}
message GetResponse {
  Note note = 1;
}

// ListRequest pages a user's notes in chunks.
message ListRequest {
  string last_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListResponse {
  repeated Note notes = 1;
}

message UpdateRequest {
  string id = 1;
  bytes data = 2;
  int64 version = 3;
}
message UpdateResponse {
  Note note = 1;
}

message DeleteRequest {
  string id = 1;
}
message DeleteResponse {}

service NoteService {
  rpc Add(AddRequest) returns (AddResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}